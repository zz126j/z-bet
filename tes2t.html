  const canvas=document.getElementById('stockCanvas');const ctx=canvas.getContext('2d');
  let priceHistory=[],currentPrice=100;
  for(let i=0;i<40;i++){const change=(rng()-0.51)*3;currentPrice=Math.max(10,currentPrice+change);priceHistory.push(currentPrice);}
  function drawChart(prediction=null){ctx.clearRect(0,0,480,260);const min=Math.min(...priceHistory)-5,max=Math.max(...priceHistory)+5,range=max-min||1;function toY(v){return 240-(v-min)/range*200;}ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;for(let i=0;i<=4;i++){const y=20+i*50;ctx.beginPath();ctx.moveTo(40,y);ctx.lineTo(460,y);ctx.stroke();}ctx.beginPath();ctx.moveTo(40,toY(priceHistory[0]));const step=(460-40)/Math.max(priceHistory.length-1,1);priceHistory.forEach((p,i)=>{ctx.lineTo(40+i*step,toY(p));});ctx.strokeStyle='rgba(0,212,255,0.8)';ctx.lineWidth=2;ctx.stroke();ctx.lineTo(40+(priceHistory.length-1)*step,240);ctx.lineTo(40,240);ctx.closePath();ctx.fillStyle='rgba(0,212,255,0.05)';ctx.fill();const lastY=toY(priceHistory[priceHistory.length-1]);ctx.fillStyle='rgba(0,212,255,0.9)';ctx.beginPath();ctx.arc(40+(priceHistory.length-1)*step,lastY,5,0,Math.PI*2);ctx.fill();if(prediction==='up'){ctx.fillStyle='rgba(0,230,118,0.8)';ctx.font='bold 20px sans-serif';ctx.fillText('▲',450,lastY+5);}if(prediction==='down'){ctx.fillStyle='rgba(255,53,83,0.8)';ctx.font='bold 20px sans-serif';ctx.fillText('▼',450,lastY+5);}ctx.fillStyle='var(--text)';ctx.font='bold 13px Inter,sans-serif';ctx.textAlign='right';ctx.fillText('$'+currentPrice.toFixed(2),440,lastY-7);ctx.textAlign='left';}
  drawChart();
  const sidebar=document.getElementById('gameBetSidebar');
  makeBetPanel({label:'Up ▲',onPlay:"window._stockUp()"});
  const betPanel=sidebar.querySelector('.bet-panel');
  const downBtn=document.createElement('button');downBtn.className='play-btn';downBtn.style.cssText='margin-top:7px;background:linear-gradient(135deg,var(--red),#aa0022);';downBtn.textContent='Down ▼';downBtn.onclick=()=>window._stockDown();betPanel.insertBefore(downBtn,betPanel.querySelector('.cooldown-bar'));
  function resolve(prediction){const bet=getBet();if(!bet||cooldownActive)return;startCooldown(1800);drawChart(prediction);setTimeout(()=>{const trend=(rng()-0.52)*6+(rng()-0.5)*4;const newPrice=Math.max(5,currentPrice+trend);priceHistory.push(newPrice);if(priceHistory.length>50)priceHistory.shift();const went=newPrice>currentPrice?'up':'down';currentPrice=newPrice;drawChart();if(went===prediction){const p=bet*1.88;winBet(p-bet,main);setResult('Correct! +$'+fmt(p-bet),'win');addHistory('+$'+fmt(p-bet),'win');}else{loseBet(bet,main);setResult('Wrong -$'+fmt(bet),'lose');addHistory('-$'+fmt(bet),'lose');}},1600);}
  window._stockUp=()=>resolve('up');window._stockDown=()=>resolve('down');
  return {destroy:()=>{}};
};

// ===== SHELL GAME (animated cups) =====
GAME_RUNNERS.cups = function() {
  const main=document.getElementById('gameMain');
  let cupCount=3,ballUnder=0,stage='idle',betAmount=0;
  // positions[i] = which visual slot cup i is currently in
  let positions=[0,1,2,0];// cup idx -> slot position
  let animating=false;

  function cupHTML(cupIdx,slotIdx,showBall=false,clickable=false){
    const hasBall=showBall&&(positions[cupIdx]===ballUnder||slotIdx===ballUnder);
    const actualBall=showBall&&positions.indexOf(ballUnder)===cupIdx;
    return `<div id="cup-wrapper-${cupIdx}" style="position:absolute;left:${(slotIdx/(cupCount-1||1))*80}%;transform:translateX(-50%);bottom:0;text-align:center;transition:left 0.7s cubic-bezier(0.4,0,0.2,1);cursor:${clickable?'pointer':'default'}" ${clickable?`onclick="window._cupsGuess(${cupIdx})"`:''}> 
      <svg viewBox="0 0 100 130" width="100" height="130" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="cupg${cupIdx}" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#b06030"/><stop offset="100%" stop-color="#6a3010"/></linearGradient></defs>
        <path d="M12 100 Q9 62 18 42 L30 22 L70 22 L82 42 Q91 62 88 100Z" fill="url(#cupg${cupIdx})" stroke="#8B4513" stroke-width="2"/>
        <ellipse cx="50" cy="100" rx="40" ry="7" fill="#5a2a08"/>
        <ellipse cx="50" cy="22" rx="22" ry="5" fill="#c87a40"/>
        <rect x="38" y="10" width="24" height="15" rx="5" fill="#c87a40" stroke="#8B4513" stroke-width="1.5"/>
        <ellipse cx="50" cy="10" rx="12" ry="5" fill="#d4904a"/>
        ${actualBall?'<circle cx="50" cy="116" r="10" fill="#ffd740" stroke="#b8a000" stroke-width="1.5"/>':''}
      </svg>
      <div style="font-size:11px;color:var(--text3);margin-top:2px;">${cupIdx+1}</div>
    </div>`;
  }

  function render(showBall=false){
    // Build slot array: slot->cupIdx mapping
    const slotToCup=new Array(cupCount).fill(-1);
    for(let c=0;c<cupCount;c++) slotToCup[positions[c]]=c;
    let cupsHTML='';
    for(let c=0;c<cupCount;c++) cupsHTML+=cupHTML(c,positions[c],showBall,stage==='choose'&&!animating);
    main.innerHTML=`<div style="width:100%;padding:22px 14px 10px;display:flex;flex-direction:column;align-items:center;gap:16px;">
      <div style="font-size:13px;color:var(--text2);text-align:center;">${stage==='choose'?'Click a cup to guess!':stage==='shuffling'?'👀 Watch carefully...':stage==='reveal'?'Revealing...':'Place a bet to play!'}</div>
      <div style="position:relative;height:160px;width:100%;max-width:420px;">
        ${cupsHTML}
        <div style="position:absolute;bottom:0;left:10%;right:10%;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;"></div>
      </div>
    </div>`;
  }

  async function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

  async function doShuffle(){
    const swapCount=7+Math.floor(rng()*7);
    for(let i=0;i<swapCount;i++){
      const a=Math.floor(rng()*cupCount);
      const b=(a+1+Math.floor(rng()*(cupCount-1)))%cupCount;
      // Swap positions of cups a and b
      const tmp=positions[a]; positions[a]=positions[b]; positions[b]=tmp;
      // Animate by updating DOM directly
      for(let c=0;c<cupCount;c++){
        const el=document.getElementById('cup-wrapper-'+c);
        if(el) el.style.left=`${(positions[c]/(cupCount-1||1))*80}%`;
      }
      await sleep(420+Math.floor(rng()*220));
    }
  }

  window._cupsGuess=async(i)=>{
    if(stage!=='choose'||animating)return;
    animating=true;
    const won=(i===positions.indexOf(ballUnder));
    stage='reveal'; render(true);
    await sleep(1200);
    if(won){
      const mult=cupCount===3?2:cupCount===4?3:4;
      const p=betAmount*mult*0.96;
      winBet(p-betAmount,main);setResult('Correct! +$'+fmt(p-betAmount),'win');addHistory('+$'+fmt(p-betAmount),'win');
    }else{
      loseBet(betAmount,main);setResult('Wrong! -$'+fmt(betAmount),'lose');addHistory('-$'+fmt(betAmount),'lose');
    }
    stage='idle';animating=false;startCooldown(600);
    document.getElementById('playBtn').textContent='Play Again';
  };

  makeBetPanel({label:'Start Shuffle',onPlay:'window._cupsStart()'});
  const bp=document.getElementById('gameBetSidebar').querySelector('.bet-panel');
  const sd=document.createElement('div');
  sd.innerHTML=`<div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">Cups</div><div style="display:flex;gap:6px;margin-bottom:10px;"><button class="bet-quick-btn" onclick="window._cupsSetCount(3,this)" style="border-color:var(--accent2)">3 (2×)</button><button class="bet-quick-btn" onclick="window._cupsSetCount(4,this)">4 (3×)</button><button class="bet-quick-btn" onclick="window._cupsSetCount(5,this)">5 (4×)</button></div>`;
  bp.insertBefore(sd,bp.querySelector('.play-btn'));
  window._cupsSetCount=(n,el)=>{cupCount=n;positions=Array.from({length:n},(_,i)=>i);document.querySelectorAll('.bet-quick-btn').forEach(b=>b.style.borderColor='');el.style.borderColor='var(--accent2)';};

  window._cupsStart=async()=>{
    betAmount=getBet();if(!betAmount)return;
    ballUnder=Math.floor(rng()*cupCount);
    positions=Array.from({length:cupCount},(_,i)=>i);
    stage='reveal';render(true);
    await sleep(1200);
    stage='shuffling';render(false);
    animating=true;
    await doShuffle();
    stage='choose';animating=false;render(false);
    document.getElementById('playBtn').textContent='Play Again';
    startCooldown(2500);
  };
  main.innerHTML=`<div style="text-align:center;color:var(--text3);font-size:13px;padding:18px;">Place a bet to start</div>`;
  return {destroy:()=>{animating=false;}};
};

// ===== CASES (CS:GO style unboxing) =====
GAME_RUNNERS.cases = function() {
  const main=document.getElementById('gameMain');
  const sidebar=document.getElementById('gameBetSidebar');

  const CASES_DATA = [
    { id:'basic', name:'Basic Case', price:10, color:'#5a6f82', rarity:'common',
      items:[
        {name:'Pebble',val:0.5,color:'#5a6f82',rarity:'common',weight:35},
        {name:'Stone',val:2,color:'#5a6f82',weight:22},
        {name:'Crystal',val:5,color:'#3b82f6',rarity:'uncommon',weight:14},
        {name:'Sapphire',val:12,color:'#3b82f6',rarity:'rare',weight:10},
        {name:'Emerald',val:25,color:'#a855f7',rarity:'epic',weight:8},
        {name:'Ruby',val:50,color:'#ef4444',rarity:'legendary',weight:5},
        {name:'Diamond',val:120,color:'#ffd740',rarity:'mythic',weight:3},
        {name:'Phantom Gem',val:500,color:'#ff00ff',rarity:'ultra',weight:0.8}
      ]
    },
    { id:'premium', name:'Premium Case', price:50, color:'#3b82f6', rarity:'rare',
      items:[
        {name:'Quartz',val:5,color:'#5a6f82',weight:28},
        {name:'Topaz',val:15,color:'#5a6f82',weight:20},
        {name:'Sapphire',val:40,color:'#3b82f6',weight:15},
        {name:'Emerald',val:80,color:'#a855f7',weight:12},
        {name:'Ruby',val:150,color:'#ef4444',weight:8},
        {name:'Gold Bar',val:300,color:'#ffd740',weight:5},
        {name:'Diamond',val:800,color:'#ffd740',weight:3},
        {name:'Phantom Star',val:3000,color:'#ff00ff',weight:1}
      ]
    },
    { id:'elite', name:'Elite Case', price:200, color:'#ffd740', rarity:'mythic',
      items:[
        {name:'Silver',val:20,color:'#5a6f82',weight:25},
        {name:'Gold',val:80,color:'#ffd740',weight:20},
        {name:'Platinum',val:200,color:'#3b82f6',weight:15},
        {name:'Emerald',val:400,color:'#a855f7',weight:12},
        {name:'Ruby',val:800,color:'#ef4444',weight:9},
        {name:'Crown',val:1500,color:'#ffd740',weight:6},
        {name:'Jackpot',val:5000,color:'#a855f7',weight:4},
        {name:'Phantom Crown',val:15000,color:'#ff00ff',weight:1.5}
      ]
    }
  ];

  const rarityColors={common:'#5a6f82',uncommon:'#3b82f6',rare:'#a855f7',epic:'#ef4444',legendary:'#ffd740',mythic:'#ff6600',ultra:'#ff00ff'};

  let selCase=0, spinning=false;

  function getItemRarityColor(item) {
    if(item.val>=1000) return '#ff00ff';
    if(item.val>=300) return '#ffd740';
    if(item.val>=80) return '#ef4444';
    if(item.val>=25) return '#a855f7';
    if(item.val>=8) return '#3b82f6';
    return '#5a6f82';
  }

  function pickItem(c) {
    const total=c.items.reduce((s,it)=>s+it.weight,0);
    let r=rng()*total;
    for(const it of c.items){r-=it.weight;if(r<=0)return it;}
    return c.items[c.items.length-1];
  }

  function buildUI() {
    const c=CASES_DATA[selCase];
    main.innerHTML=`
      <div style="width:100%;height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden;">
        <!-- Case selector tabs -->
        <div style="display:flex;gap:4px;padding:10px 12px 0;flex-shrink:0;">
          ${CASES_DATA.map((cs,i)=>`
            <div onclick="window._caseSelect(${i})" style="flex:1;padding:7px;border-radius:8px 8px 0 0;cursor:pointer;text-align:center;font-size:11px;font-weight:700;
              background:${i===selCase?'rgba(61,111,255,0.18)':'rgba(255,255,255,0.04)'};
              border:1px solid ${i===selCase?'var(--accent2)':'var(--border)'};border-bottom:none;
              color:${i===selCase?'var(--accent2)':'var(--text3)'};transition:all 0.15s;">
              ${cs.name}<br><span style="font-size:10px;opacity:0.7">$${cs.price}</span>
            </div>`).join('')}
        </div>
        <!-- Spinner area -->
        <div style="background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:0 0 12px 12px;flex-shrink:0;position:relative;overflow:hidden;height:130px;">
          <!-- Center line -->
          <div style="position:absolute;left:50%;top:0;bottom:0;width:3px;background:linear-gradient(180deg,transparent,var(--gold),transparent);transform:translateX(-50%);z-index:3;pointer-events:none;"></div>
          <!-- Top/bottom fade -->
          <div style="position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,0.8),transparent 20%,transparent 80%,rgba(0,0,0,0.8));z-index:2;pointer-events:none;"></div>
          <div id="caseTrack" style="display:flex;align-items:center;gap:4px;height:100%;padding:0 8px;will-change:transform;"></div>
        </div>
        <div id="caseResult" style="text-align:center;padding:8px;font-size:13px;font-weight:700;min-height:30px;flex-shrink:0;"></div>
        <!-- Items list -->
        <div style="flex:1;overflow-y:auto;padding:8px 12px;scrollbar-width:thin;">
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">Possible Items</div>
          <div style="display:flex;flex-direction:column;gap:3px;">
            ${[...c.items].sort((a,b)=>b.val-a.val).map(it=>{const col=getItemRarityColor(it);return `
              <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 8px;background:${col}11;border-radius:6px;border-left:3px solid ${col};">
                <span style="font-size:12px;font-weight:600;color:var(--text)">${it.name}</span>
                <span style="font-size:12px;font-weight:700;color:${col};font-variant-numeric:tabular-nums;">$${it.val.toFixed(2)}</span>
              </div>`;}).join('')}
          </div>
        </div>
      </div>`;
  }

  function buildSpinnerItems(c, winItem) {
    const track=document.getElementById('caseTrack');
    const items=[];
    for(let i=0;i<80;i++){
      if(i===40) items.push(winItem);
      else items.push(c.items[Math.floor(rng()*c.items.length)]);
    }
    track.innerHTML=items.map(it=>{
      const col=getItemRarityColor(it);
      return `<div style="flex-shrink:0;width:110px;height:110px;border-radius:10px;background:${col}18;border:2px solid ${col}44;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:6px;">
        <div style="font-size:26px;">◆</div>
        <div style="font-size:11px;font-weight:700;color:${col};text-align:center;line-height:1.2;">${it.name}</div>
        <div style="font-size:11px;color:var(--text2);font-weight:600;">$${it.val}</div>
      </div>`;
    }).join('');
    return items;
  }

  // Build a simple buy panel — no bet slider, just a buy button
  function buildBuyPanel() {
    const c = CASES_DATA[selCase];
    sidebar.innerHTML = `<div style="display:flex;flex-direction:column;gap:10px;padding:14px;">
      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;">Balance</div>
      <div id="caseBalDisplay" style="font-size:22px;font-weight:900;color:var(--gold);font-family:'Rajdhani',sans-serif;">$${fmt(STATE.balance)}</div>
      <div style="height:1px;background:var(--border);margin:2px 0;"></div>
      <div style="font-size:11px;color:var(--text2);">Selected case costs:</div>
      <div id="casePriceDisplay" style="font-size:20px;font-weight:800;color:var(--accent2);font-family:'Rajdhani',sans-serif;">$${c.price.toFixed(2)}</div>
      <button id="caseOpenBtn" onclick="window._caseOpen()" style="margin-top:8px;width:100%;padding:14px;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:'Rajdhani',sans-serif;letter-spacing:1px;transition:opacity 0.15s;">
        📦 OPEN CASE
      </button>
      <div style="font-size:10px;color:var(--text3);text-align:center;margin-top:2px;">No bet needed — just buy & open!</div>
    </div>`;
  }

  buildUI();
  buildBuyPanel();

  window._caseSelect=(i)=>{if(spinning)return;selCase=i;buildUI();buildBuyPanel();};

  window._caseOpen=()=>{
    if(spinning)return;
    const c=CASES_DATA[selCase];
    if(STATE.balance<c.price){
      showToast('Need $'+c.price+' to open this case!','info');return;
    }
    spinning=true;
    // Deduct cost directly from balance (no bet panel)
    STATE.balance-=c.price; saveState(); updateNav();
    document.getElementById('caseBalDisplay').textContent='$'+fmt(STATE.balance);
    document.getElementById('caseOpenBtn').style.opacity='0.5';

    const winItem=pickItem(c);
    buildSpinnerItems(c,winItem);
    const track=document.getElementById('caseTrack');
    document.getElementById('caseResult').textContent='';
    const itemW=114;
    const wrapW=track.parentElement.offsetWidth;
    const targetX=40*itemW - wrapW/2 + itemW/2 + (rng()-0.5)*40;
    track.style.transition='none';
    track.style.transform='translateX(0)';
    requestAnimationFrame(()=>{requestAnimationFrame(()=>{
      track.style.transition='transform 4.5s cubic-bezier(0.12,0.85,0.25,1)';
      track.style.transform=`translateX(-${targetX}px)`;
    })});
    setTimeout(()=>{
      spinning=false;
      const col=getItemRarityColor(winItem);
      const res=document.getElementById('caseResult');
      const profit=winItem.val-c.price;
      if(res){
        res.style.color=profit>=0?'var(--green)':'var(--red)';
        res.textContent=winItem.name+' — '+(profit>=0?'+':'')+profit.toFixed(2);
      }
      const winEl=track.children[40];
      if(winEl){winEl.style.borderColor=col;winEl.style.boxShadow='0 0 24px '+col+'88';}
      // Add item value to balance
      STATE.balance+=winItem.val; saveState(); updateNav();
      if(document.getElementById('caseBalDisplay')) document.getElementById('caseBalDisplay').textContent='$'+fmt(STATE.balance);
      if(document.getElementById('caseOpenBtn')) document.getElementById('caseOpenBtn').style.opacity='1';
      if(profit>=0){setResult(winItem.name+' +$'+fmt(profit),'win');addHistory('+$'+fmt(profit),'win');}
      else{setResult(winItem.name+' -$'+fmt(-profit),'lose');addHistory('-$'+fmt(-profit),'lose');}
      startCooldown(400);
    },4700);
  };

  return {destroy:()=>{spinning=false;}};
};

// ===== INIT =====
window.addEventListener('DOMContentLoaded', () => {
  loadState();
  buildSidebar();
  buildHomeGrid();
  updateNav();
  setTimeout(() => {
    const ls=document.getElementById('loadingScreen');
    ls.style.opacity='0';
    setTimeout(()=>ls.remove(),500);
  }, 1300);
  document.addEventListener('keydown', e => { if(e.key==='Escape'&&STATE.currentGame) showHome(); });
});

// expose globals
window.showHome=showHome; window.openDeposit=openDeposit; window.closeDeposit=closeDeposit;
window.confirmDeposit=confirmDeposit; window.setDepositQuick=setDepositQuick;
window.getBet=getBet; window.setBet=setBet; window.adjustBet=adjustBet; window.maxBet=maxBet;
window.setResult=setResult; window.addHistory=addHistory; window.startCooldown=startCooldown;
window.fmt=fmt; window.winBet=winBet; window.loseBet=loseBet;
</script>
</body>
</html>
