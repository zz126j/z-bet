// ===== TOWER CLIMB =====
GAME_RUNNERS.tower = function() {
  const ROWS=8,COLS=3;let grid=[],cleared=[],currentRow=ROWS-1,inGame=false,betAmount=0;
  const main=document.getElementById('gameMain');
  function buildGrid(){grid=[];for(let r=0;r<ROWS;r++){const bi=Math.floor(rng()*COLS);grid.push(Array.from({length:COLS},(_,c)=>c===bi?'bomb':'safe'));}}
  function render(){main.innerHTML=`<div style="padding:12px;width:100%;overflow-y:auto;max-height:460px;">${Array.from({length:ROWS},(_,r)=>{const row=grid[r],rCleared=cleared.includes(r),isActive=inGame&&r===currentRow;return`<div style="margin:3px 0" class="tower-row">${row.map((cell,c)=>{if(rCleared)return`<div class="tower-cell cleared">${cell==='bomb'?'💣':'✓'}</div>`;if(!isActive)return`<div class="tower-cell" style="opacity:${inGame&&r>currentRow?0.3:0.8}">?</div>`;return`<div class="tower-cell current-row" onclick="window._towerClick(${r},${c})">?</div>`;}).join('')}</div>`;}).reverse().join('')}</div>`;}
  window._towerClick=(r,c)=>{if(!inGame||r!==currentRow)return;const cell=grid[r][c];cleared.push(r);if(cell==='bomb'){inGame=false;loseBet(betAmount,main);setResult('Hit a bomb! -$'+fmt(betAmount),'lose');addHistory('-$'+fmt(betAmount),'lose');render();startCooldown(800);document.getElementById('playBtn').textContent='New Game';document.getElementById('cashoutTower').style.display='none';}else{currentRow--;const m=1+((ROWS-currentRow-1)*0.3);render();document.getElementById('cashoutTower').textContent=`Cash Out ${m.toFixed(1)}× $${fmt(betAmount*m*0.96)}`;if(currentRow<0){inGame=false;const p=betAmount*(1+ROWS*0.3)*0.96;winBet(p-betAmount,main);setResult('Top! +$'+fmt(p-betAmount),'win');addHistory('+$'+fmt(p-betAmount),'win');startCooldown(600);document.getElementById('cashoutTower').style.display='none';}}};
  const sidebar=document.getElementById('gameBetSidebar');
  makeBetPanel({label:'Build Tower',onPlay:'window._towerStart()'});
  const bp=sidebar.querySelector('.bet-panel');
  const coBtn=document.createElement('button');coBtn.id='cashoutTower';coBtn.className='play-btn cashout';coBtn.style.cssText='margin-top:7px;display:none;';coBtn.textContent='Cash Out';coBtn.onclick=()=>window._towerCashout();bp.insertBefore(coBtn,bp.querySelector('.cooldown-bar'));
  window._towerCashout=()=>{if(!inGame||cleared.length===0)return;inGame=false;const m=1+(cleared.length*0.3),p=betAmount*m*0.96;winBet(p-betAmount,main);setResult('Cashed! +$'+fmt(p-betAmount),'win');addHistory('+$'+fmt(p-betAmount),'win');render();startCooldown(500);document.getElementById('cashoutTower').style.display='none';};
  window._towerStart=()=>{betAmount=getBet();if(!betAmount)return;buildGrid();cleared=[];currentRow=ROWS-1;inGame=true;render();document.getElementById('cashoutTower').style.display='block';document.getElementById('playBtn').textContent='New Game';};
  main.innerHTML=`<div style="text-align:center;color:var(--text3);font-size:13px;padding:18px;">Climb the tower!</div>`;
  render();return {destroy:()=>{inGame=false;}};
};

// ===== SCRATCH CARD =====
GAME_RUNNERS.scratch = function() {
  const main=document.getElementById('gameMain');
  const PRIZES=[{label:'💎 JACKPOT',mult:20,weight:0.005},{label:'⭐ BIG WIN',mult:10,weight:0.02},{label:'🔔 WIN',mult:5,weight:0.05},{label:'🍀 Lucky',mult:2.5,weight:0.1},{label:'✓ Small',mult:1.5,weight:0.15},{label:'✗ Nothing',mult:0,weight:0.675}];
  function pickPrize(){let r=rng(),total=0;for(let p of PRIZES){total+=p.weight;if(r<=total)return p;}return PRIZES[PRIZES.length-1];}
  let currentPrize=null,scratched=false;
  function render(reveal=false){const p=currentPrize;main.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;gap:18px;padding:28px;"><div class="scratch-card">${p&&reveal?`<div class="scratch-prize"><div style="text-align:center"><div style="font-size:13px;font-weight:900;color:${p.mult>1?'var(--gold)':'var(--text3)'}">${p.label}</div>${p.mult>0?`<div style="font-size:10px;color:var(--text2);margin-top:3px;">${p.mult}× payout</div>`:''}</div></div>`:''}\n${!reveal?`<div class="scratch-layer" id="scratchLayer" onclick="window._scratchReveal()"><div style="text-align:center"><div style="font-size:18px">🪙</div><div style="margin-top:3px;font-size:11px;">SCRATCH</div></div></div>`:''}</div>${reveal&&p?`<div style="font-size:17px;font-weight:800;color:${p.mult>1?'var(--gold)':'var(--red)'}">${p.mult>1?'You won!':'Better luck next time'}</div>`:''}</div>`;}
  window._scratchReveal=()=>{if(scratched)return;scratched=true;const bet=getBet();if(!bet)return;currentPrize=pickPrize();render(true);if(currentPrize.mult>1){const p=bet*currentPrize.mult*0.97;winBet(p-bet,main);setResult(currentPrize.label+' +$'+fmt(p-bet),'win');addHistory('+$'+fmt(p-bet),'win');}else{loseBet(bet,main);setResult('Nothing -$'+fmt(bet),'lose');addHistory('-$'+fmt(bet),'lose');}startCooldown(600);scratched=false;};
  makeBetPanel({label:'Get Card',onPlay:'window._scratchGet()'});
  window._scratchGet=()=>{const bet=getBet();if(!bet)return;scratched=false;currentPrize=null;render(false);document.getElementById('playBtn').textContent='New Card';};
  main.innerHTML=`<div style="text-align:center;color:var(--text3);font-size:13px;padding:18px;">Get a scratch card!</div>`;
  render(false);return {destroy:()=>{}};
};

// ===== STOCKS =====
GAME_RUNNERS.stocks = function() {
  const main=document.getElementById('gameMain');
  main.innerHTML=`<canvas id="stockCanvas" width="480" height="260" style="display:block;margin:auto;border-radius:12px;background:rgba(5,10,30,0.5);border:1px solid var(--border);max-width:100%;"></canvas>`;
  const canvas=document.getElementById('stockCanvas');const ctx=canvas.getContext('2d');
  let priceHistory=[],currentPrice=100;
  for(let i=0;i<40;i++){const change=(rng()-0.51)*3;currentPrice=Math.max(10,currentPrice+change);priceHistory.push(currentPrice);}
  function drawChart(prediction=null){ctx.clearRect(0,0,480,260);const min=Math.min(...priceHistory)-5,max=Math.max(...priceHistory)+5,range=max-min||1;function toY(v){return 240-(v-min)/range*200;}ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;for(let i=0;i<=4;i++){const y=20+i*50;ctx.beginPath();ctx.moveTo(40,y);ctx.lineTo(460,y);ctx.stroke();}ctx.beginPath();ctx.moveTo(40,toY(priceHistory[0]));const step=(460-40)/Math.max(priceHistory.length-1,1);priceHistory.forEach((p,i)=>{ctx.lineTo(40+i*step,toY(p));});ctx.strokeStyle='rgba(0,212,255,0.8)';ctx.lineWidth=2;ctx.stroke();ctx.lineTo(40+(priceHistory.length-1)*step,240);ctx.lineTo(40,240);ctx.closePath();ctx.fillStyle='rgba(0,212,255,0.05)';ctx.fill();const lastY=toY(priceHistory[priceHistory.length-1]);ctx.fillStyle='rgba(0,212,255,0.9)';ctx.beginPath();ctx.arc(40+(priceHistory.length-1)*step,lastY,5,0,Math.PI*2);ctx.fill();if(prediction==='up'){ctx.fillStyle='rgba(0,230,118,0.8)';ctx.font='bold 20px sans-serif';ctx.fillText('▲',450,lastY+5);}if(prediction==='down'){ctx.fillStyle='rgba(255,53,83,0.8)';ctx.font='bold 20px sans-serif';ctx.fillText('▼',450,lastY+5);}ctx.fillStyle='var(--text)';ctx.font='bold 13px Inter,sans-serif';ctx.textAlign='right';ctx.fillText('$'+currentPrice.toFixed(2),440,lastY-7);ctx.textAlign='left';}
  drawChart();
  const sidebar=document.getElementById('gameBetSidebar');
  makeBetPanel({label:'Up ▲',onPlay:"window._stockUp()"});
  const betPanel=sidebar.querySelector('.bet-panel');
  const downBtn=document.createElement('button');downBtn.className='play-btn';downBtn.style.cssText='margin-top:7px;background:linear-gradient(135deg,var(--red),#aa0022);';downBtn.textContent='Down ▼';downBtn.onclick=()=>window._stockDown();betPanel.insertBefore(downBtn,betPanel.querySelector('.cooldown-bar'));
  function resolve(prediction){const bet=getBet();if(!bet||cooldownActive)return;startCooldown(1800);drawChart(prediction);setTimeout(()=>{const trend=(rng()-0.52)*6+(rng()-0.5)*4;const newPrice=Math.max(5,currentPrice+trend);priceHistory.push(newPrice);if(priceHistory.length>50)priceHistory.shift();const went=newPrice>currentPrice?'up':'down';currentPrice=newPrice;drawChart();if(went===prediction){const p=bet*1.88;winBet(p-bet,main);setResult('Correct! +$'+fmt(p-bet),'win');addHistory('+$'+fmt(p-bet),'win');}else{loseBet(bet,main);setResult('Wrong -$'+fmt(bet),'lose');addHistory('-$'+fmt(bet),'lose');}},1600);}
  window._stockUp=()=>resolve('up');window._stockDown=()=>resolve('down');
  return {destroy:()=>{}};
};

// ===== SHELL GAME =====
GAME_RUNNERS.cups = function() {
  const main=document.getElementById('gameMain');let cupCount=3,ballCup=0,stage='choose',animating=false,betAmount=0;let positions=[0,1,2];
  function cupSVG(idx,hasBall=false){return`<svg class="cup-svg" viewBox="0 0 80 100" width="70" height="90" xmlns="http://www.w3.org/2000/svg"><path d="M10 80 Q8 50 15 35 L25 20 L55 20 L65 35 Q72 50 70 80Z" fill="#884422" stroke="#6a3310" stroke-width="2"/><ellipse cx="40" cy="80" rx="32" ry="6" fill="#663311"/>${hasBall?'<circle cx="40" cy="90" r="8" fill="#ffcc00" stroke="#cc9900" stroke-width="1.5"/>':''}</svg>`;}
  function render(showBall=false){main.innerHTML=`<div style="width:100%;padding:22px 14px;display:flex;flex-direction:column;align-items:center;gap:18px;"><div style="font-size:13px;color:var(--text2);text-align:center;">${stage==='choose'?'Click a cup to guess!':stage==='shuffling'?'Watch carefully...':stage==='reveal'?'Revealing...':'Place a bet to play!'}</div><div style="display:flex;gap:${cupCount>3?14:28}px;justify-content:center;align-items:flex-end;padding-bottom:16px;">${Array.from({length:cupCount},(_,i)=>`<div style="text-align:center;cursor:${stage==='choose'&&!animating?'pointer':'default'}" id="cup${i}" onclick="${stage==='choose'&&!animating?`window._cupsGuess(${i})`:'null'}">${cupSVG(i,showBall&&positions[i]===ballCup)}<div style="font-size:11px;color:var(--text3);margin-top:3px;">${i+1}</div></div>`).join('')}</div></div>`;}
  function doShuffle(onDone){let swaps=8+Math.floor(rng()*8),done=0;function swapCups(){if(done>=swaps){onDone();return;}const a=Math.floor(rng()*cupCount),b=(a+1+Math.floor(rng()*(cupCount-1)))%cupCount;[positions[a],positions[b]]=[positions[b],positions[a]];render(false);done++;setTimeout(swapCups,120+Math.floor(rng()*80));}swapCups();}
  window._cupsGuess=(i)=>{if(stage!=='choose'||animating)return;animating=true;const won=(i===ballCup);stage='reveal';render(true);setTimeout(()=>{if(won){const mult=cupCount===3?2:cupCount===4?3:4;const p=betAmount*mult*(1-0.04);winBet(p-betAmount,main);setResult('Correct! +$'+fmt(p-betAmount),'win');addHistory('+$'+fmt(p-betAmount),'win');}else{loseBet(betAmount,main);setResult('Wrong! -$'+fmt(betAmount),'lose');addHistory('-$'+fmt(betAmount),'lose');}stage='done';animating=false;startCooldown(600);document.getElementById('playBtn').textContent='Play Again';},1200);};
  makeBetPanel({label:'Start Shuffle',onPlay:'window._cupsStart()'});
  const bp=document.getElementById('gameBetSidebar').querySelector('.bet-panel');
  const sd=document.createElement('div');
  sd.innerHTML=`<div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">Cups</div><div style="display:flex;gap:6px;margin-bottom:10px;"><button class="bet-quick-btn" onclick="window._cupsSetCount(3,this)" style="border-color:var(--accent2)">3 (2×)</button><button class="bet-quick-btn" onclick="window._cupsSetCount(4,this)">4 (3×)</button><button class="bet-quick-btn" onclick="window._cupsSetCount(5,this)">5 (4×)</button></div>`;
  bp.insertBefore(sd,bp.querySelector('.play-btn'));
  window._cupsSetCount=(n,el)=>{cupCount=n;document.querySelectorAll('.bet-quick-btn').forEach(b=>b.style.borderColor='');el.style.borderColor='var(--accent2)';};
  window._cupsStart=()=>{betAmount=getBet();if(!betAmount)return;ballCup=Math.floor(rng()*cupCount);positions=Array.from({length:cupCount},(_,i)=>i);stage='reveal';render(true);setTimeout(()=>{stage='shuffling';render(false);doShuffle(()=>{stage='choose';animating=false;render(false);});},1200);document.getElementById('playBtn').textContent='Play Again';startCooldown(2800);};
  main.innerHTML=`<div style="text-align:center;color:var(--text3);font-size:13px;padding:18px;">Place a bet to start</div>`;
  return {destroy:()=>{animating=false;}};
};
